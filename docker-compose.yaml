services:
  # 1. Your Symfony App (Swapped FrankenPHP image out for your custom Dockerfile build)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_ENV=dev
      - DATABASE_URL=mysql://darllexie:dramatique@mysql:3306/Dramatique_DB?serverVersion=8.0
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - darl_network

  # 2. Your MySQL Database
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dimagnaong
      MYSQL_DATABASE: Dramatique_DB
      MYSQL_USER: darllexie
      MYSQL_PASSWORD: dramatique
    ports:
      - "3312:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - darl_network

  # 3. Your phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: darllexie
      PMA_PASSWORD: dramatique
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - darl_network

volumes:
  mysql_data:

networks:
  darl_network:
    driver: bridge