server {
    # 1. Listen on Port 443 for SSL and enable HTTP/2
    listen 443 ssl http2 default_server;
    
    root /app/public;
    index index.php;

    # 2. Add your SSL Certificate Paths
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem; # Replace with your cert path
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem; # Replace with your key path

    # Recommended basic SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Handle /api/uploads/ by looking in /uploads/
    location ~ ^/api/uploads/(.*)$ {
        try_files /uploads/$1 /index.php$is_args$args;
    }

    # Serve static files directly (all folders in public/)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf|mp4|webm|wav|mp3|m4a|aac|oga|jfif|pdf|docx|xlsx|zip|tgz|gz|rar|bz2|doc|xls|exe|ppt|tar|mid|midi|ra)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Main application - route all requests through index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP-FPM handler
    location ~ ^/index\.php {
        fastcgi_pass localhost:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;

        # Custom FastCGI parameters
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeout settings for long-running requests
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 60s;
        
        internal;
    }

    # Deny execution of PHP files in other locations
    location ~ \.php$ {
        return 404;
    }
}